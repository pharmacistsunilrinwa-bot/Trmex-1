# Project-wide Gradle settings

# Android Gradle Plugin settings
org.gradle.jvmargs=-Xmx4096m
org.gradle.parallel=true
org.gradle.daemon=true

# Flutter Gradle settings
android.useAndroidX=true
android.enableJetifier=true

# Enable incremental build for faster compilation
android.incremental=true

# Optimize build performance
android.enableBuildCacheDeprecationWarning=false

# R8/ProGuard settings for release builds
android.enableR8=true
android.enableProguardInReleaseBuilds=true

# Target SDK version
android.targetSdkVersion=34
android.minSdkVersion=21
